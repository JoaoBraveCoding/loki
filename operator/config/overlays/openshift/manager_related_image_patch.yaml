apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
spec:
  template:
    spec:
      containers:
        - name: manager
          env:
          - name: RELATED_IMAGE_LOKI
            value: quay.io/openshift-logging/loki:v3.5.5
          - name: RELATED_IMAGE_GATEWAY
            value: quay.io/observatorium/api:latest
          - name: RELATED_IMAGE_OPA
            value: quay.io/jmarcal/opa-openshift:skip-infer-ns-2025-11-24-ebf872c-dirty
