---
# Single-broker Kafka for development/testing.
# No replication, ephemeral storage, no authentication. DO NOT USE IN PRODUCTION.
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: broker
  namespace: openshift-logging
  labels:
    strimzi.io/cluster: loki-kafka
spec:
  replicas: 1
  roles:
    - broker
    - controller
  storage:
    type: ephemeral
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: loki-kafka
  namespace: openshift-logging
  annotations:
    strimzi.io/node-pools: enabled
spec:
  kafka:
    version: 4.2.0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
  entityOperator:
    topicOperator: {}
    userOperator: {}
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: loki
  namespace: openshift-logging
  labels:
    strimzi.io/cluster: loki-kafka
spec:
  partitions: 100
  replicas: 1
  config:
    retention.ms: 86400000
