apiVersion: v1
kind: Namespace
metadata:
  name: openshift-logging
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-broker
  namespace: openshift-logging
  labels:
    app: kafka-broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-broker
  template:
    metadata:
      labels:
        app: kafka-broker
    spec:
      initContainers:
        - name: init-config
          image: apache/kafka:latest
          command:
            - /bin/sh
            - -c
            - cp -r /opt/kafka/config/* /tmp/kafka-config/
          volumeMounts:
            - name: kafka-config
              mountPath: /tmp/kafka-config
      containers:
        - name: kafka
          image: apache/kafka:latest
          ports:
            - containerPort: 9092
              name: broker
            - containerPort: 29093
              name: controller
          volumeMounts:
            - name: kafka-config
              mountPath: /opt/kafka/config
            - name: kafka-logs
              mountPath: /tmp/kraft-combined-logs
            - name: kafka-gc-logs
              mountPath: /opt/kafka/logs
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka-broker.openshift-logging.svc.cluster.local:9092
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: 1@localhost:29093
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            - name: KAFKA_NUM_PARTITIONS
              value: "100"
            - name: KAFKA_LOG_DIRS
              value: /tmp/kraft-combined-logs
            - name: CLUSTER_ID
              value: MkU3OEVBNTcwNTJENDM2Qk
      volumes:
        - name: kafka-config
          emptyDir: {}
        - name: kafka-logs
          emptyDir: {}
        - name: kafka-gc-logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-broker
  namespace: openshift-logging
  labels:
    app: kafka-broker
spec:
  selector:
    app: kafka-broker
  ports:
    - port: 9092
      targetPort: 9092
      name: broker
  type: ClusterIP
